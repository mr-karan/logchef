name: Logchef CLI

on:
  push:
    paths:
      - "cli/**"
      - ".agents/skills/logchef/**"
      - "rust-toolchain.toml"
      - ".github/workflows/rust-cli.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".agents/skills/logchef/**"
      - "rust-toolchain.toml"
      - ".github/workflows/rust-cli.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The CLI embeds the skill from cli/crates/logchef-cli/skill (must live
      # inside the Cargo workspace for cross release builds). Guard it against
      # drift from the canonical copy at .agents/skills/logchef.
      - name: Skill copy in sync with canonical source
        run: diff -r .agents/skills/logchef cli/crates/logchef-cli/skill

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli

      - name: Format
        run: cargo fmt --check
        working-directory: cli

      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: cli

      - name: Test
        run: cargo test
        working-directory: cli
