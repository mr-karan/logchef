# Logchef configuration (TOML).
#
# This file contains only essential bootstrap settings required to start Logchef.
# Runtime settings (AI, alerts, auth sessions, server frontend URL) are managed
# in the Admin UI and stored in the database.
#
# Values can be overridden via environment variables prefixed with LOGCHEF_.
# Use double underscores for nesting: LOGCHEF_SERVER__PORT=8125.

# -----------------------------------------------------------------------------
# Server (required)
# -----------------------------------------------------------------------------
[server]
# HTTP API port.
port = 8125
# Bind address (0.0.0.0 listens on all interfaces).
host = "0.0.0.0"
# HTTP server request timeout. Must exceed preview and export execution ceilings.
http_server_timeout = "15m"
# Secure cookie flag (set to false for local HTTP development).
secure_cookie = false
# Frontend URL for auth redirects and UI links is managed in the Admin UI.
# For first boot with a separate frontend origin, set LOGCHEF_SERVER__FRONTEND_URL.

# -----------------------------------------------------------------------------
# Metadata backend (optional) — selects where application metadata is stored
# -----------------------------------------------------------------------------
[database]
# "sqlite" (default, single binary, zero-config) or "postgres" (multi-replica/HA).
# Logs always live in ClickHouse regardless of this setting.
driver = "sqlite"

# -----------------------------------------------------------------------------
# SQLite (used when database.driver = "sqlite")
# -----------------------------------------------------------------------------
[sqlite]
# Path to the SQLite database file (relative to the working directory).
path = "local.db"

# -----------------------------------------------------------------------------
# Postgres (used when database.driver = "postgres")
# -----------------------------------------------------------------------------
# [postgres]
# Full connection string (required when driver = "postgres").
# dsn = "postgres://logchef:logchef@localhost:5432/logchef?sslmode=disable"
# Connection pool tuning (optional; sane defaults applied).
# max_open_conns = 25
# max_idle_conns = 5
# conn_max_lifetime = "30m"

# -----------------------------------------------------------------------------
# OpenID Connect (OIDC) (required)
# -----------------------------------------------------------------------------
[oidc]
# OIDC provider discovery URL.
provider_url = "http://localhost:5556/dex"
# Explicit auth/token endpoints (required even when discovery is available).
auth_url = "http://localhost:5556/dex/auth"
token_url = "http://localhost:5556/dex/token"
# OIDC client credentials for the web UI login flow.
client_id = "logchef"
# Dev-only secret. Replace this in production.
client_secret = "logchef-secret"
# CLI client ID for CLI authentication (public OIDC client, PKCE flow).
# The OIDC provider must allow loopback redirects:
# http://127.0.0.1:19876/callback ... 19878/callback
cli_client_id = "logchef-cli"
# Callback URL for OIDC authentication (must match provider config).
redirect_url = "http://localhost:8125/api/v1/auth/callback"
# OIDC scopes to request.
scopes = ["openid", "email", "profile"]
# Keep false unless your OIDC provider omits email_verified while verifying
# email addresses by other means. Missing/null email_verified is allowed only
# when this is true; explicit email_verified=false is always rejected.
skip_email_verified_check = false

# -----------------------------------------------------------------------------
# Authentication (required)
# -----------------------------------------------------------------------------
[auth]
# Admin email addresses (required).
admin_emails = ["admin@logchef.internal"]
# Secret key for API token hashing (required; generate with: openssl rand -hex 32).
# Dev-only value. Replace this in production.
api_token_secret = "5679649c50fddda837449b77d9983ab5f8dba65878897e968a74e7061bf47677"

# JIT (just-in-time) user auto-provisioning on first OIDC login (optional).
# When enabled, a first-time OIDC login from an allowed domain creates a
# regular member user automatically instead of failing with "user not found".
# Auto-provisioned users are never admins (admin_emails is unaffected) and are
# never adopted/managed by [provisioning] — they're plain, user-editable rows.
[auth.auto_provision]
enabled = false
# Email domains eligible for auto-provisioning. Matching is an exact,
# case-insensitive comparison against the domain part of the OIDC email
# claim — no subdomain/wildcard matching. Required (non-empty) when enabled.
allowed_domains = ["example.com"]
# Team IDs an auto-provisioned user is added to as role "member" (optional).
# A nonexistent team ID is logged and skipped; it never fails the login.
# default_team_ids = [1]

# -----------------------------------------------------------------------------
# Query Settings (optional)
# -----------------------------------------------------------------------------
[query]
# Browser Run is intentionally bounded. Download uses [export].
default_preview_limit = 1000
max_preview_limit = 100000
max_response_bytes = 67108864
default_timeout_seconds = 30
max_timeout_seconds = 300
max_concurrent_per_user = 3
max_concurrent_global = 30

[export]
# Download jobs use this higher cap and keep completed artifacts for a limited time.
max_rows = 1000000
default_timeout_seconds = 120
max_timeout_seconds = 600
max_concurrent_per_user = 1
max_concurrent_global = 5
artifact_ttl = "24h"
formats = ["csv", "ndjson"]

[tail]
# Live tail (SSE) streams. ClickHouse polls on poll_interval; VictoriaLogs
# streams natively. Guardrails are mandatory: admission limits, a hard session
# TTL, and a per-stream row-rate ceiling (excess rows are dropped, not buffered).
poll_interval = "2s"
max_per_user = 2
max_global = 20
# Kept under [server] http_server_timeout (15m default) — fasthttp write
# deadline caps any single response, tails included. Clients re-arm on end.
session_ttl = "14m"
max_rows_per_sec = 100

[shares]
default_ttl = "720h"
max_query_text_bytes = 1048576

# -----------------------------------------------------------------------------
# Provisioning (optional) — Declarative config for teams, sources, access
# -----------------------------------------------------------------------------
[provisioning]
file = "dev/provisioning.toml"
