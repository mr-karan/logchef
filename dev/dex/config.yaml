issuer: http://localhost:5556/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

staticClients:
  - id: logchef
    redirectURIs:
      - "http://localhost:8125/api/v1/auth/callback"
      # Ad hoc backend instance used to validate issue #34 (auto-provisioning). Safe to remove after.
      - "http://localhost:8130/api/v1/auth/callback"
    name: "Logchef"
    secret: logchef-secret

  - id: logchef-cli
    redirectURIs:
      - "http://127.0.0.1:19876/callback"
      - "http://127.0.0.1:19877/callback"
      - "http://127.0.0.1:19878/callback"
    name: "Logchef CLI"
    public: true

oauth2:
  skipApprovalScreen: true

enablePasswordDB: true

